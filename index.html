<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanabi Deluxe II</title>
<style>
:root {
  --red:#c0392b; --yellow:#c8900a; --green:#1e9e50; --blue:#1a6fb5; --white:#8a8880;
  --bg:#f4f2ee; --surface:#ffffff; --surface2:#f0ede8; --surface3:#e8e4de;
  --border:#ddd8d0; --border2:#c8c2b8;
  --ink:#1e1c18; --ink2:#5a5448; --ink3:#9a9088;
  --accent:#1a6fb5; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:13px;display:flex;flex-direction:column;}

/* ── SETUP ── */
#setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;padding:24px;}
.sc{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:36px;width:100%;max-width:440px;}
.sc h1{font-size:26px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;margin-bottom:3px;}
.sc .sub{color:var(--ink3);font-size:12px;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:6px;}
.field select,.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--ink);font-size:13px;padding:9px 12px;font-family:inherit;outline:none;}
.field select:focus,.field input:focus{border-color:var(--accent);}
.seat-row{display:flex;gap:6px;flex-wrap:wrap;}
.seat-chip{padding:6px 13px;border-radius:999px;border:1px solid var(--border2);font-size:12px;cursor:pointer;user-select:none;background:var(--surface2);color:var(--ink2);transition:all .15s;}
.seat-chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
.btn-go{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:800;padding:13px;cursor:pointer;font-family:inherit;margin-top:6px;transition:background .15s;}
.btn-go:hover{background:#155da0;}

/* ── GAME SHELL ── */
#game{display:none;flex-direction:column;height:100%;}
#game.on{display:flex;}

/* TOP BAR */
.topbar{
  display:grid;
  grid-template-columns:auto 1fr auto auto auto auto;
  align-items:center;
  gap:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0;
  flex-shrink:0;
  height:52px;
}
.tb-title{font-size:14px;font-weight:800;color:var(--accent);padding:0 16px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;}
.tb-fireworks{display:flex;align-items:center;gap:8px;padding:0 16px;border-right:1px solid var(--border);height:100%;}
.fw-stack{display:flex;flex-direction:column;align-items:center;gap:2px;}
.fw-label{font-size:9px;font-weight:700;letter-spacing:.04em;}
.fw-pips-row{display:flex;gap:2px;}
.fw-dot{width:9px;height:9px;border-radius:2px;border:1px solid var(--border2);}
.fw-dot.on{border:none;}
.tb-tokens{display:flex;flex-direction:column;gap:4px;padding:0 14px;border-right:1px solid var(--border);height:100%;justify-content:center;}
.tok-row{display:flex;gap:3px;align-items:center;}
.tok-label{font-size:9px;color:var(--ink3);width:36px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.tok{width:10px;height:10px;border-radius:50%;}
.tok.c-on{background:#4a90d9;}
.tok.c-off{background:var(--border2);}
.tok.f-on{background:#c0392b;}
.tok.f-off{background:var(--border2);}
.tb-stats{display:flex;flex-direction:column;gap:2px;padding:0 14px;border-right:1px solid var(--border);height:100%;justify-content:center;}
.tb-stat{font-size:11px;color:var(--ink3);}
.tb-stat strong{color:var(--ink);font-weight:700;}
.tb-winmeter{padding:0 14px;border-right:1px solid var(--border);height:100%;display:flex;flex-direction:column;justify-content:center;gap:3px;min-width:130px;}
.wm-label{font-size:10px;font-weight:700;color:var(--ink3);display:flex;justify-content:space-between;}
.wm-track{height:7px;background:var(--surface2);border-radius:999px;border:1px solid var(--border);overflow:hidden;}
.wm-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#c0392b,#d4a017 50%,#27ae60);transition:width .5s ease;}
.tb-btns{padding:0 12px;display:flex;gap:8px;align-items:center;}

/* BODY */
.body{display:grid;grid-template-columns:1fr 280px;flex:1;overflow:hidden;min-height:0;}

/* MAIN (left) */
.main{display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.main-scroll{overflow-y:auto;flex:1;padding:14px;display:flex;flex-direction:column;gap:12px;}

/* SIDEBAR (right) */
.sidebar{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--surface);}
.sb-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-tab{flex:1;padding:9px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;color:var(--ink3);border:none;background:none;font-family:inherit;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;border-bottom:2px solid transparent;}
.sb-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sb-pane{display:none;flex:1;overflow-y:auto;padding:12px;}
.sb-pane.active{display:block;}

/* ── PLAYER ROWS ── */
.player-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;transition:border-color .2s;}
.player-row.active{border-color:var(--accent);}
.player-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.player-name{font-weight:700;font-size:13px;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700;}
.tag.turn{background:var(--accent);color:#fff;}
.tag.bot{background:var(--surface2);color:var(--ink3);border:1px solid var(--border2);}
.tag.human{background:#deeaf8;color:#1a5090;border:1px solid #b0cce8;}
.hand{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end;}

/* ── TILES ── */
.tile{
  width:56px;height:76px;border-radius:7px;border:1px solid #c8b880;
  background:linear-gradient(155deg,#fffef8 0%,#f5efd0 100%);
  box-shadow:0 2px 0 #b8a860,0 4px 7px rgba(0,0,0,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  position:relative;flex-shrink:0;cursor:default;transition:transform .1s,box-shadow .1s;
}
.tile.sm{width:30px;height:42px;border-radius:5px;box-shadow:0 1px 0 #b8a860,0 2px 4px rgba(0,0,0,.15);gap:2px;}
.tile-gem{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;box-shadow:inset 0 2px 4px rgba(255,255,255,.25),0 1px 3px rgba(0,0,0,.35);}
.tile.sm .tile-gem{width:16px;height:16px;font-size:9px;}
.tile-pips{display:flex;gap:2px;}
.pip{width:5px;height:5px;border-radius:50%;opacity:.8;}
.tile.sm .pip{width:3px;height:3px;}

/* hidden */
.tile.hidden{background:linear-gradient(155deg,#dde8f4 0%,#c8d8ee 100%);border-color:#a0b8d8;box-shadow:0 2px 0 #8090a8,0 4px 7px rgba(0,0,0,.18);cursor:pointer;}
.tile.hidden:hover{transform:translateY(-4px);box-shadow:0 6px 0 #8090a8,0 10px 14px rgba(0,0,0,.15);}
.tile.hidden.sel{outline:2px solid var(--accent);outline-offset:3px;transform:translateY(-5px);}
.h-emblem{font-size:16px;opacity:.3;}
.h-label{font-size:8.5px;font-weight:600;color:#2a4a6a;text-align:center;padding:0 3px;line-height:1.3;}
.h-note{position:absolute;bottom:2px;left:2px;right:2px;font-size:7px;font-weight:600;color:#1a1208;text-align:center;line-height:1.2;background:rgba(255,210,60,.9);border-radius:2px;padding:1px 2px;}

/* clueable */
.tile.clueable{cursor:pointer;}
.tile.clueable:hover{transform:translateY(-3px);box-shadow:0 5px 0 #7a6e30,0 8px 12px rgba(0,0,0,.5);}
.tile.hl{outline:2px solid var(--accent);outline-offset:3px;}
.tile.dim{opacity:.35;}
.tile.empty{background:repeating-linear-gradient(45deg,#e8e4de,#e8e4de 5px,#ddd8d0 5px,#ddd8d0 10px);box-shadow:none;border:1px dashed var(--border2);}

/* discard tile — smaller with color label */
.disc-group{margin-bottom:10px;}
.disc-color-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.disc-color-bar{width:3px;height:14px;border-radius:2px;flex-shrink:0;}
.disc-color-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.disc-tiles{display:flex;gap:4px;flex-wrap:wrap;}
.disc-tile{
  width:28px;height:38px;border-radius:4px;border:1px solid #c8b880;
  background:linear-gradient(155deg,#fffef8 0%,#f5efd0 100%);
  box-shadow:0 1px 0 #b8a860,0 2px 4px rgba(0,0,0,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  flex-shrink:0;position:relative;
}
.disc-gem{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:8px;box-shadow:inset 0 1px 2px rgba(255,255,255,.25);}
.disc-pips{display:flex;gap:1px;}
.disc-pip{width:3px;height:3px;border-radius:50%;opacity:.8;}
.disc-tile.critical{outline:2px solid #c0392b;outline-offset:1px;}
.disc-tile.last{outline:2px solid #d4a017;outline-offset:1px;}
.disc-empty{font-size:11px;color:var(--ink3);font-style:italic;padding:4px 0;}

/* ── ACTION PANEL ── */
.action-panel{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:13px 14px;}
.ap-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:10px;}
.ap-hint{font-size:12px;color:var(--ink3);margin-bottom:10px;}
.ap-row{display:flex;gap:7px;flex-wrap:wrap;}
.btn{background:var(--surface2);border:1px solid var(--border2);color:var(--ink2);border-radius:6px;font-size:12px;padding:6px 12px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
.btn.danger{color:#c0392b;border-color:#c0392b;}
.btn.danger:hover{background:#c0392b;color:#fff;}

/* clue UI */
.clue-box{background:#eff5fc;border:1px solid #b8d0ea;border-radius:7px;padding:10px 12px;font-size:12px;color:#2a5080;margin-bottom:10px;}
.clue-pick{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.clue-pick-label{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}
.cswatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.35);}
.cswatch:hover{transform:scale(1.18);}
.cswatch.on{border-color:#fff;transform:scale(1.18);}
.cswatch.na{opacity:.18;cursor:not-allowed;transform:none!important;}
.rbtn{width:28px;height:28px;border-radius:5px;background:var(--surface2);border:1px solid var(--border2);color:var(--ink);font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.rbtn:hover{border-color:var(--accent);color:var(--accent);}
.rbtn.on{background:var(--accent);color:#1a1208;border-color:var(--accent);}
.rbtn:disabled{opacity:.2;cursor:not-allowed;}

/* advice */
.advice-rows{margin-top:8px;}
.adv-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--ink3);}
.adv-row strong{color:var(--ink);}
.adv-rec{margin-top:8px;background:#edf7f0;border:1px solid #a0d4b0;border-radius:6px;padding:8px 10px;font-size:12px;color:#1a6e38;}

/* log */
.log-line{font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--ink3);}
.log-line .n{color:var(--ink2);font-weight:700;margin-right:4px;}
.log-line.ok{color:#1a7a38;}
.log-line.bad{color:#b02020;}
.log-line.clu{color:#1a50a0;}
.log-line.dis{color:var(--ink3);}

/* bot trace */
.trace-line{font-size:10px;color:var(--ink3);font-style:italic;padding:2px 0;}

/* game over */
.go-banner{border-radius:var(--radius);padding:18px 20px;text-align:center;margin-bottom:12px;}
.go-banner.win{background:#eaf7ef;border:1px solid #27ae60;color:#0e6e30;}
.go-banner.loss{background:#fdf0ef;border:1px solid #c0392b;color:#8e1a10;}
.go-banner.deck_out{background:#eff4fc;border:1px solid #1a6fb5;color:#0e3e7a;}
.go-banner h2{font-size:20px;margin-bottom:5px;}
.go-banner p{font-size:12px;opacity:.75;}

/* pass overlay */
.overlay{position:fixed;inset:0;background:rgba(240,236,230,.92);display:flex;align-items:center;justify-content:center;z-index:100;}
.ov-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:44px 36px;text-align:center;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.ov-card h3{font-size:18px;color:var(--accent);margin-bottom:6px;}
.ov-card p{color:var(--ink3);font-size:13px;margin-bottom:22px;}

/* toast */
.toast-wrap{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:200;}
.toast{background:#fff;border:1px solid var(--border2);border-radius:7px;padding:9px 14px;font-size:12px;color:var(--ink);max-width:260px;box-shadow:0 4px 12px rgba(0,0,0,.1);animation:sli .2s ease;}
.toast.err{border-color:#c0392b;color:#8e1a10;}
@keyframes sli{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="sc">
    <h1>Hanabi Deluxe II</h1>
    <div class="sub">Cooperative fireworks · 50 tiles · 8 clues · 3 fuses</div>
    <div class="field">
      <label>Players</label>
      <select id="pc"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select>
    </div>
    <div class="field">
      <label>Seed (optional)</label>
      <input id="seed" type="number" placeholder="leave blank for random">
    </div>
    <div class="field">
      <label>Your seat</label>
      <div class="seat-row" id="seats"></div>
    </div>
    <div class="field">
      <label>Mode</label>
      <div class="seat-row" id="mode-row">
        <div class="seat-chip on" id="mode-normal" onclick="setMode('normal')">Normal</div>
        <div class="seat-chip" id="mode-director" onclick="setMode('director')">Director — control all bots</div>
      </div>
      <div style="margin-top:7px;font-size:11px;color:var(--ink3)" id="mode-desc">You play your seat; bots move automatically.</div>
    </div>
    <button class="btn-go" id="startbtn">Start game →</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-title">Hanabi II</div>
    <div class="tb-fireworks" id="tb-fw"></div>
    <div class="tb-tokens" id="tb-tok"></div>
    <div class="tb-stats" id="tb-stats"></div>
    <div class="tb-winmeter" id="tb-win">
      <div class="wm-label"><span>Win odds</span><span id="wm-pct">—</span></div>
      <div class="wm-track"><div class="wm-fill" id="wm-fill" style="width:0%"></div></div>
    </div>
    <div class="tb-btns">
      <button class="btn" id="rewind-btn" title="Undo last move" disabled>↩ Undo</button>
      <button class="btn" id="director-toggle" title="Toggle director mode" style="display:none">🎬 Director: ON</button>
      <button class="btn" id="newgame-btn">New game</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">
    <!-- MAIN -->
    <div class="main">
      <div class="main-scroll" id="main-scroll">
        <div id="banner"></div>
        <div id="hands"></div>
        <div id="action"></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-tabs">
        <button class="sb-tab active" data-pane="discard">Discards</button>
        <button class="sb-tab" data-pane="log">History</button>
        <button class="sb-tab" data-pane="trace">Bot</button>
      </div>
      <div class="sb-pane active" id="pane-discard"></div>
      <div class="sb-pane" id="pane-log"></div>
      <div class="sb-pane" id="pane-trace"></div>
    </div>
  </div>
</div>

<!-- PASS OVERLAY -->
<div class="overlay" id="overlay" style="display:none">
  <div class="ov-card">
    <h3 id="ov-title">Pass the device</h3>
    <p id="ov-sub">Hand off to the next player, then tap Ready.</p>
    <button class="btn-go" style="width:auto;padding:11px 30px" id="ov-btn">I'm ready →</button>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const COLORS=['Red','Yellow','Green','Blue','White'];
const CHX={Red:'#c0392b',Yellow:'#d4a017',Green:'#27ae60',Blue:'#1a6fb5',White:'#8a8880'};
const RC={1:3,2:2,3:2,4:2,5:1};
const MAX_C=8,MAX_F=3,FW_TOT=25;
const ALL_PAIRS=[];
for(const c of COLORS)for(const r of Object.keys(RC))ALL_PAIRS.push(c+','+r);
function handSize(n){return n<=3?5:4;}

// RNG
function mulberry(s){return()=>{s|=0;s=(s+0x6D2B79F5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function mkRng(s){return mulberry(s==null||s===''?Math.floor(Math.random()*1e9):Number(s));}

// Knowledge
function newK(){return{possible:new Set(ALL_PAIRS),notes:[]};}
function isId(k){return k.possible.size===1;}
function isUnt(k){return k.possible.size===ALL_PAIRS.length;}
function pairOf(s){const i=s.lastIndexOf(',');return{color:s.slice(0,i),rank:parseInt(s.slice(i+1))};}
function filterK(k,pred,note){k.possible=new Set([...k.possible].filter(pred));k.notes.push(note);}
function descK(k){
  if(isId(k)){const{color,rank}=pairOf([...k.possible][0]);return`${color[0]}${rank}`;}
  const cs=new Set(),rs=new Set();
  for(const p of k.possible){const{color,rank}=pairOf(p);cs.add(color);rs.add(rank);}
  return`${cs.size<5?[...cs].map(c=>c[0]).sort().join(''):'?'}·${rs.size<5?[...rs].sort((a,b)=>a-b).join(''):'?'}`;
}

// Game
class Game{
  constructor(n,seed){
    this.n=n;this.h=handSize(n);
    const rng=mkRng(seed);
    this.deck=[];
    for(const c of COLORS)for(const r in RC)for(let i=0;i<RC[r];i++)this.deck.push({color:c,rank:parseInt(r)});
    for(let i=this.deck.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[this.deck[i],this.deck[j]]=[this.deck[j],this.deck[i]];}
    this.hands=Array.from({length:n},()=>[]);
    this.know=Array.from({length:n},()=>[]);
    for(let r=0;r<this.h;r++)for(let p=0;p<n;p++)this._draw(p);
    this.disc=[];this.fw={};for(const c of COLORS)this.fw[c]=0;
    this.clues=MAX_C;this.strikes=0;this.turn=0;this.turnN=0;
    this.finalLeft=null;this.over=false;this.result=null;
    this.log=[];this.discN=0;this.clueN=0;this.rng=rng;
  }
  _draw(p){if(this.deck.length>0){this.hands[p].push(this.deck.pop());this.know[p].push(newK());}}
  score(){return COLORS.reduce((s,c)=>s+this.fw[c],0);}
  accCounts(){
    const a={};
    for(const c of this.disc){const k=c.color+','+c.rank;a[k]=(a[k]||0)+1;}
    for(const c of COLORS)for(let r=1;r<=this.fw[c];r++){const k=c+','+r;a[k]=(a[k]||0)+1;}
    for(const hand of this.know)for(const k of hand)if(isId(k)){const key=[...k.possible][0];a[key]=(a[key]||0)+1;}
    return a;
  }
  elim(){
    let ch=true;
    while(ch){ch=false;const a=this.accCounts();
      for(const hand of this.know)for(const k of hand){
        if(isId(k))continue;
        const before=k.possible,after=new Set(),rm=[];
        for(const p of before){const{rank}=pairOf(p);if((a[p]||0)<RC[rank])after.add(p);else rm.push(p);}
        if(after.size!==before.size){for(const p of rm)k.notes.push('elim '+p);k.possible=after;ch=true;if(after.size===1)k.notes.push('=>'+[...after][0]);}
      }
    }
  }
  legal(p){
    const a=[];
    if(this.clues>0)for(let t=0;t<this.n;t++){if(t===p)continue;
      for(const c of new Set(this.hands[t].map(x=>x.color)))a.push({kind:'clue',target:t,ct:'color',v:c});
      for(const r of new Set(this.hands[t].map(x=>x.rank)))a.push({kind:'clue',target:t,ct:'rank',v:r});}
    if(this.clues<MAX_C)for(let i=0;i<this.hands[p].length;i++)a.push({kind:'discard',idx:i});
    for(let i=0;i<this.hands[p].length;i++)a.push({kind:'play',idx:i});
    return a;
  }
  apply(p,action){
    if(this.over)throw new Error('game over');
    if(action.kind==='clue'){
      if(this.clues<=0)throw new Error('no clue tokens');
      if(action.target===p)throw new Error("can't clue yourself");
      let hit=false;
      for(let i=0;i<this.hands[action.target].length;i++){
        const card=this.hands[action.target][i],k=this.know[action.target][i];
        if(action.ct==='color'){const m=card.color===action.v;filterK(k,s=>(pairOf(s).color===action.v)===m,`color ${m?'IS':'NOT'} ${action.v}`);if(m)hit=true;}
        else{const m=card.rank===action.v;filterK(k,s=>(pairOf(s).rank===action.v)===m,`rank ${m?'IS':'NOT'} ${action.v}`);if(m)hit=true;}
      }
      if(!hit)throw new Error('clue must touch at least one tile');
      this.clues--;this.clueN++;
      this.log.push({type:'clu',text:`P${p} → P${action.target}: ${action.ct}=${action.v}`});
      this.elim();
    } else if(action.kind==='discard'){
      if(this.clues>=MAX_C)throw new Error("can't discard with 8 clues");
      const card=this.hands[p].splice(action.idx,1)[0];this.know[p].splice(action.idx,1);
      this.disc.push(card);this.clues=Math.min(MAX_C,this.clues+1);this.discN++;
      this.log.push({type:'dis',text:`P${p} discards ${card.color[0]}${card.rank}`});
      this.elim();this._rep(p);
    } else if(action.kind==='play'){
      const card=this.hands[p].splice(action.idx,1)[0];this.know[p].splice(action.idx,1);
      if(this.fw[card.color]===card.rank-1){
        this.fw[card.color]=card.rank;
        this.log.push({type:'ok',text:`P${p} plays ${card.color[0]}${card.rank} ✓`});
        if(card.rank===5)this.clues=Math.min(MAX_C,this.clues+1);
        if(this.score()===FW_TOT){this.over=true;this.result='win';}
      } else {
        this.disc.push(card);this.strikes++;
        this.log.push({type:'bad',text:`P${p} misplays ${card.color[0]}${card.rank} ✗ (${this.strikes}/${MAX_F})`});
        if(this.strikes>=MAX_F){this.over=true;this.result='loss';}
      }
      this.elim();if(!this.over)this._rep(p);
    }
  }
  _rep(p){if(this.deck.length>0){this._draw(p);if(this.deck.length===0&&this.finalLeft===null)this.finalLeft=this.n+1;}}
  advance(){
    this.turnN++;
    if(this.finalLeft!==null){this.finalLeft--;if(this.finalLeft<=0&&!this.over){this.over=true;this.result=this.result||'deck_out';}}
    this.turn=(this.turn+1)%this.n;
  }
  clone(){
    const g=Object.create(Game.prototype);
    g.n=this.n;g.h=this.h;g.deck=this.deck.map(c=>({...c}));
    g.hands=this.hands.map(h=>h.map(c=>({...c})));
    g.know=this.know.map(h=>h.map(k=>({possible:new Set(k.possible),notes:[...k.notes]})));
    g.disc=this.disc.map(c=>({...c}));g.fw={...this.fw};
    g.clues=this.clues;g.strikes=this.strikes;g.turn=this.turn;g.turnN=this.turnN;
    g.finalLeft=this.finalLeft;g.over=this.over;g.result=this.result;
    g.log=[];g.discN=this.discN;g.clueN=this.clueN;g.rng=this.rng;
    return g;
  }
}

// Bot
function remCount(g,color,rank){let u=0;for(const c of g.disc)if(c.color===color&&c.rank===rank)u++;if(g.fw[color]>=rank)u++;return RC[rank]-u;}
function isPlay(pos,fw){for(const p of pos){const{color,rank}=pairOf(p);if(fw[color]!==rank-1)return false;}return true;}
function isDead(pos,fw){for(const p of pos){const{color,rank}=pairOf(p);if(rank>fw[color])return false;}return true;}

function botAct(g,p,tr){
  tr=tr||[];const hand=g.hands[p],know=g.know[p];
  for(let i=0;i<know.length;i++)if(isPlay(know[i].possible,g.fw)){tr.push(`Play slot ${i} (provably safe)`);return{action:{kind:'play',idx:i},tr};}
  if(g.clues>0){
    for(let off=1;off<g.n;off++){const t=(p+off)%g.n,tH=g.hands[t],tK=g.know[t];
      for(let i=0;i<tH.length;i++){const card=tH[i],k=tK[i];
        if(isPlay(k.possible,g.fw)||g.fw[card.color]!==card.rank-1)continue;
        const tc=new Set([...k.possible].filter(s=>pairOf(s).color===card.color));
        if(tc.size&&isPlay(tc,g.fw)){tr.push(`Clue P${t} color=${card.color}`);return{action:{kind:'clue',target:t,ct:'color',v:card.color},tr};}
        const tr2=new Set([...k.possible].filter(s=>pairOf(s).rank===card.rank));
        if(tr2.size&&isPlay(tr2,g.fw)){tr.push(`Clue P${t} rank=${card.rank}`);return{action:{kind:'clue',target:t,ct:'rank',v:card.rank},tr};}
      }
    }
    for(let off=1;off<g.n;off++){const t=(p+off)%g.n,tH=g.hands[t],tK=g.know[t];
      const chop=tK.findIndex(k=>isUnt(k));if(chop===-1)continue;
      const card=tH[chop];
      if((card.rank===5||remCount(g,card.color,card.rank)===1)&&!isDead(tK[chop].possible,g.fw)){
        tr.push(`Save P${t} slot ${chop}`);return{action:{kind:'clue',target:t,ct:'rank',v:card.rank},tr};}
    }
  }
  if(g.clues<MAX_C){
    for(let i=0;i<know.length;i++)if(isDead(know[i].possible,g.fw)){tr.push(`Discard dead slot ${i}`);return{action:{kind:'discard',idx:i},tr};}
    for(let i=0;i<know.length;i++)if(isUnt(know[i])){tr.push(`Discard chop slot ${i}`);return{action:{kind:'discard',idx:i},tr};}
    tr.push('Discard slot 0');return{action:{kind:'discard',idx:0},tr};
  }
  const l=g.legal(p).filter(a=>a.kind==='clue');
  if(l.length){tr.push('Arbitrary clue');return{action:l[0],tr};}
  tr.push('Blind play slot 0');return{action:{kind:'play',idx:0},tr};
}

// Win probability
function winProb(g,N=350){
  if(g.over)return g.result==='win'?1:0;
  let w=0;
  for(let s=0;s<N;s++){
    const gc=g.clone();
    for(let i=gc.deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[gc.deck[i],gc.deck[j]]=[gc.deck[j],gc.deck[i]];}
    let safe=0;
    while(!gc.over&&safe++<250){const{action}=botAct(gc,gc.turn,null);try{gc.apply(gc.turn,action);}catch(e){break;}gc.advance();}
    if(gc.result==='win')w++;
  }
  return w/N;
}

// State
let game=null,humanSeat=0,directorMode=false,selSlot=null,clueMode=false,clueTarget=null,clueType=null,clueVal=null,thinkLines=[],history=[];

// Setup
function setMode(m){
  directorMode=m==='director';
  document.getElementById('mode-normal').className='seat-chip'+(directorMode?'':' on');
  document.getElementById('mode-director').className='seat-chip'+(directorMode?' on':'');
  document.getElementById('mode-desc').textContent=directorMode
    ?'You decide every move for every player — great for experimenting.'
    :'You play your seat; bots move automatically.';
}

function renderSeats(){
  const n=parseInt(document.getElementById('pc').value);
  const el=document.getElementById('seats');el.innerHTML='';
  for(let i=0;i<n;i++){
    const ch=document.createElement('div');
    ch.className='seat-chip'+(humanSeat===i?' on':'');
    ch.textContent='P'+i;
    ch.onclick=()=>{humanSeat=i;renderSeats();};
    el.appendChild(ch);
  }
}
document.getElementById('pc').addEventListener('change',()=>{
  const n=parseInt(document.getElementById('pc').value);
  if(humanSeat>=n)humanSeat=0;
  renderSeats();
});
renderSeats();
document.getElementById('startbtn').addEventListener('click',()=>{
  const n=parseInt(document.getElementById('pc').value);
  const sv=document.getElementById('seed').value;
  startGame(n,sv===''?null:parseInt(sv));
});
document.getElementById('newgame-btn').addEventListener('click',()=>{document.getElementById('game').classList.remove('on');document.getElementById('setup').style.display='flex';});
document.getElementById('rewind-btn').addEventListener('click',()=>{
  if(history.length===0)return;
  const snap=history.pop();
  game=snap.game;thinkLines=snap.thinkLines;
  selSlot=null;clueMode=false;clueTarget=null;clueType=null;clueVal=null;
  document.getElementById('rewind-btn').disabled=history.length===0;
  renderAll();
});

// Sidebar tabs
document.querySelectorAll('.sb-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.sb-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.sb-pane').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-'+tab.dataset.pane).classList.add('active');
  });
});

function startGame(n,seed){
  game=new Game(n,seed);thinkLines=[];history=[];
  selSlot=null;clueMode=false;clueTarget=null;clueType=null;clueVal=null;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').classList.add('on');
  const dtbtn=document.getElementById('director-toggle');
  dtbtn.style.display='inline-block';
  dtbtn.textContent='🎬 Director: '+(directorMode?'ON':'OFF');
  dtbtn.onclick=()=>{directorMode=!directorMode;dtbtn.textContent='🎬 Director: '+(directorMode?'ON':'OFF');selSlot=null;clueMode=false;renderAll();};
  document.getElementById('rewind-btn').disabled=true;
  render();
}

function render(){
  if(!directorMode) runBots();
  if(game.over){renderGameOver();return;}
  renderAll();
}

function runBots(){
  while(!game.over&&game.turn!==humanSeat){
    const p=game.turn;const{action,tr}=botAct(game,p,[]);
    for(const l of tr)thinkLines.push(`(P${p}) ${l}`);
    try{game.apply(p,action);}catch(e){}
    thinkLines.push(`>> ${game.log[game.log.length-1]?.text}`);
    if(thinkLines.length>300)thinkLines.splice(0,60);
    game.advance();
  }
}

let winTask=null;
function scheduleWin(){
  if(winTask)clearTimeout(winTask);
  document.getElementById('wm-pct').textContent='…';
  winTask=setTimeout(()=>{
    if(!game||game.over)return;
    const p=winProb(game,350);
    const pct=Math.round(p*100);
    document.getElementById('wm-fill').style.width=pct+'%';
    document.getElementById('wm-pct').textContent=pct+'%';
  },60);
}

function renderAll(){
  renderTopBar();
  renderHands();
  renderAction();
  renderSidebar();
  scheduleWin();
}

const FW_COLORS=CHX;
function renderTopBar(){
  // fireworks
  const fwEl=document.getElementById('tb-fw');
  fwEl.innerHTML=COLORS.map(c=>{
    const top=game.fw[c];
    const pips=Array.from({length:5},(_,i)=>`<div class="fw-dot${i<top?' on':''}" style="${i<top?'background:'+FW_COLORS[c]+';':''}"></div>`).join('');
    return`<div class="fw-stack"><div class="fw-label" style="color:${FW_COLORS[c]}">${c[0]} ${top}</div><div class="fw-pips-row">${pips}</div></div>`;
  }).join('');
  // tokens
  const tEl=document.getElementById('tb-tok');
  tEl.innerHTML=`<div class="tok-row"><span class="tok-label">Clues</span>${Array.from({length:MAX_C},(_,i)=>`<div class="tok ${i<game.clues?'c-on':'c-off'}"></div>`).join('')}</div>
    <div class="tok-row"><span class="tok-label">Fuses</span>${Array.from({length:MAX_F},(_,i)=>`<div class="tok ${i<game.strikes?'f-on':'f-off'}"></div>`).join('')}</div>`;
  // stats
  document.getElementById('tb-stats').innerHTML=`<div class="tb-stat">Turn <strong>${game.turnN+1}</strong></div><div class="tb-stat">Deck <strong>${game.deck.length}</strong></div><div class="tb-stat">Score <strong>${game.score()}/25</strong></div>`;
}

function renderHands(){
  const el=document.getElementById('hands');el.innerHTML='';
  const cp=game.turn;
  for(let p=0;p<game.n;p++){
    const div=document.createElement('div');
    div.className='player-row'+(p===cp?' active':'');
    const isHumanSeat=(p===humanSeat);
    // In director mode: see all cards face-up (you're the director)
    // In normal mode: hide only your own current hand
    const showHidden=(!directorMode)&&isHumanSeat&&(p===cp);
    const isCurrentTurn=(p===cp);
    const turnTag=isCurrentTurn?`<span class="tag turn">${directorMode&&!isHumanSeat?'controlling':'your turn'}</span>`:'';
    const roleTag=isHumanSeat?'<span class="tag human">You</span>':'<span class="tag bot">Bot</span>';
    div.innerHTML=`<div class="player-header"><span class="player-name">Player ${p}</span>${turnTag}${roleTag}</div>`;
    const hand=document.createElement('div');hand.className='hand';
    for(let i=0;i<game.hands[p].length;i++){
      const card=game.hands[p][i],k=game.know[p][i];
      if(showHidden){
        // hidden tile — current human player's own hand in normal mode
        const t=document.createElement('div');
        t.className='tile hidden'+(selSlot===i?' sel':'');
        const pig=[...k.notes].filter(n=>n.startsWith('=>'));
        const note=pig.length?pig[pig.length-1].replace('=>','').trim():'';
        t.innerHTML=`<div class="h-emblem">⛩</div><div class="h-label">${descK(k)}</div>${note?`<div class="h-note">${note.slice(0,18)}</div>`:''}`;
        t.onclick=()=>{selSlot=selSlot===i?null:i;clueMode=false;renderHands();renderAction();};
        hand.appendChild(t);
      } else {
        // visible tile
        const hl=clueMode&&clueTarget===p&&clueType&&((clueType==='color'&&card.color===clueVal)||(clueType==='rank'&&card.rank===clueVal));
        const dm=clueMode&&clueTarget===p&&clueType&&!hl;
        const t=document.createElement('div');
        // In director mode, current player's tiles are selectable
        const isSelectable=(directorMode&&p===cp)||((!directorMode)&&isHumanSeat&&p===cp);
        t.className='tile'+(clueMode&&p!==cp?' clueable':'')+(hl?' hl':'')+(dm?' dim':'')+(isSelectable&&!clueMode?' clueable':'');
        t.innerHTML=tileInner(card.color,card.rank);
        if(isSelectable&&!clueMode){
          t.onclick=()=>{selSlot=selSlot===i?null:i;clueMode=false;renderHands();renderAction();};
          if(selSlot===i)t.classList.add('hl');
        }
        if(clueMode&&p!==cp){t.onclick=()=>{clueTarget=p;renderAction();renderHands();};}
        hand.appendChild(t);
      }
    }
    if(clueMode&&p!==cp){
      div.style.cursor='pointer';
      div.onclick=(e)=>{if(!e.target.classList.contains('tile')&&!e.target.closest('.tile')){clueTarget=p;clueType=null;clueVal=null;renderAction();renderHands();}};
    }
    div.appendChild(hand);el.appendChild(div);
  }
}

function tileInner(color,rank){
  const pips=Array.from({length:rank},()=>`<div class="pip" style="background:${CHX[color]}"></div>`).join('');
  return`<div class="tile-gem" style="width:30px;height:30px;font-size:15px;background:${CHX[color]};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;box-shadow:inset 0 2px 4px rgba(255,255,255,.22),0 1px 3px rgba(0,0,0,.35)">${rank}</div><div class="tile-pips">${pips}</div>`;
}

function renderAction(){
  const el=document.getElementById('action');el.innerHTML='';
  const cp=game.turn;
  // show action panel if: director mode (always), or it's the human's own seat
  if(!directorMode&&cp!==humanSeat)return;
  const panel=document.createElement('div');panel.className='action-panel';
  if(clueMode)renderClue(panel); else renderMove(panel);
  el.appendChild(panel);
}

function renderMove(panel){
  const cp=game.turn;
  panel.innerHTML=`<div class="ap-title">Your move</div><div class="ap-hint">${selSlot===null?'Click a tile in your hand to select it.':'Slot '+selSlot+' selected.'}</div>`;
  const row=document.createElement('div');row.className='ap-row';
  const pb=document.createElement('button');pb.className='btn';pb.textContent='▶ Play';pb.disabled=selSlot===null;pb.onclick=()=>doAction({kind:'play',idx:selSlot});row.appendChild(pb);
  const db=document.createElement('button');db.className='btn danger';db.textContent='✕ Discard';db.disabled=selSlot===null||game.clues>=MAX_C;db.title=game.clues>=MAX_C?"Can't discard with 8 clues":'';db.onclick=()=>doAction({kind:'discard',idx:selSlot});row.appendChild(db);
  const cb=document.createElement('button');cb.className='btn';cb.textContent='💬 Clue';cb.disabled=game.clues<=0;cb.onclick=()=>{clueMode=true;clueTarget=null;clueType=null;clueVal=null;selSlot=null;renderHands();renderAction();};row.appendChild(cb);
  const ab=document.createElement('button');ab.className='btn';ab.textContent='💡 Advice';ab.onclick=()=>showAdvice(panel);row.appendChild(ab);
  panel.appendChild(row);
}

function renderClue(panel){
  const cp=game.turn;
  panel.innerHTML=`<div class="ap-title">Give a clue</div>`;
  const box=document.createElement('div');box.className='clue-box';
  box.textContent=clueTarget===null?'Click a player\'s row or tiles to target them.':clueType===null?`Player ${clueTarget} selected — pick a color or rank.`:`Player ${clueTarget}: ${clueType}=${clueVal}. Send or change.`;
  panel.appendChild(box);
  if(clueTarget!==null){
    const tH=game.hands[clueTarget];
    const cp2=new Set(tH.map(c=>c.color)),rp=new Set(tH.map(c=>c.rank));
    const pr=document.createElement('div');pr.className='clue-pick';
    pr.innerHTML='<span class="clue-pick-label">Color</span>';
    for(const c of COLORS){const sw=document.createElement('div');sw.className='cswatch'+(clueType==='color'&&clueVal===c?' on':'')+(cp2.has(c)?'':' na');sw.style.background=CHX[c];sw.title=c;if(cp2.has(c))sw.onclick=()=>{clueType='color';clueVal=c;renderHands();renderAction();};pr.appendChild(sw);}
    pr.innerHTML+='<span class="clue-pick-label" style="margin-left:10px">Rank</span>';
    for(let r=1;r<=5;r++){const rb=document.createElement('button');rb.className='rbtn'+(clueType==='rank'&&clueVal===r?' on':'');rb.textContent=r;rb.disabled=!rp.has(r);if(rp.has(r))rb.onclick=()=>{clueType='rank';clueVal=r;renderHands();renderAction();};pr.appendChild(rb);}
    panel.appendChild(pr);
  }
  const row=document.createElement('div');row.className='ap-row';
  const sb=document.createElement('button');sb.className='btn';sb.textContent='✓ Send';sb.disabled=clueTarget===null||clueType===null;sb.onclick=()=>doAction({kind:'clue',target:clueTarget,ct:clueType,v:clueVal});row.appendChild(sb);
  const xb=document.createElement('button');xb.className='btn';xb.textContent='✕ Cancel';xb.onclick=()=>{clueMode=false;clueTarget=null;clueType=null;clueVal=null;renderHands();renderAction();};row.appendChild(xb);
  panel.appendChild(row);
}

function showAdvice(panel){
  const cp=game.turn;const know=game.know[cp];
  const acc=game.accCounts();
  const rows=know.map((k,i)=>{
    const weights={};let tot=0;
    for(const p of k.possible){const{rank}=pairOf(p);const w=RC[rank]-(acc[p]||0);if(w>0){weights[p]=w;tot+=w;}}
    let pp=0,pc=0;
    for(const p in weights){const pr=weights[p]/tot;const{color,rank}=pairOf(p);if(game.fw[color]===rank-1)pp+=pr;if(rank>game.fw[color]&&remCount(game,color,rank)<=1)pc+=pr;}
    return{i,pp,pc};
  });
  const{action:ba,tr}=botAct(game,cp,[]);
  const old=panel.querySelector('.advice-rows');if(old)old.remove();
  const div=document.createElement('div');div.className='advice-rows';
  div.innerHTML=rows.map(r=>`<div class="adv-row"><span>Slot ${r.i}</span><span>Play <strong>${(r.pp*100).toFixed(0)}%</strong> · Crit discard <strong>${(r.pc*100).toFixed(0)}%</strong></span></div>`).join('');
  div.innerHTML+=`<div class="adv-rec">Bot would: ${tr[tr.length-1]||'?'}</div>`;
  const applyBtn=document.createElement('button');applyBtn.className='btn';applyBtn.style.marginTop='8px';applyBtn.textContent='→ Apply';applyBtn.onclick=()=>doAction(ba);
  div.appendChild(applyBtn);
  panel.appendChild(div);
}

}

function renderDiscard(){
  const el=document.getElementById('pane-discard');
  if(game.disc.length===0){el.innerHTML='<div class="disc-empty">No discards yet.</div>';return;}
  const byColor={};for(const c of COLORS)byColor[c]=[];
  for(const card of game.disc)byColor[card.color].push(card.rank);
  el.innerHTML='';
  for(const color of COLORS){
    const ranks=byColor[color];if(ranks.length===0)continue;
    const group=document.createElement('div');group.className='disc-group';
    group.innerHTML=`<div class="disc-color-header"><div class="disc-color-bar" style="background:${CHX[color]}"></div><div class="disc-color-name" style="color:${CHX[color]}">${color}</div></div>`;
    const tilesDiv=document.createElement('div');tilesDiv.className='disc-tiles';
    const sorted=ranks.slice().sort((a,b)=>a-b);
    for(const rank of sorted){
      const total=RC[rank];
      const discardedOfThis=sorted.filter(r=>r===rank).length;
      const remaining=total-discardedOfThis-(game.fw[color]>=rank?1:0);
      const isCritical=remaining<=0;
      const isLast=remaining===1;
      const dt=document.createElement('div');
      dt.className='disc-tile'+(isCritical?' critical':isLast?' last':'');
      dt.title=`${color} ${rank} — ${remaining<=0?'eliminated!':remaining===1?'last copy!':remaining+' left'}`;
      const pips=Array.from({length:rank},()=>`<div class="disc-pip" style="background:${CHX[color]}"></div>`).join('');
      dt.innerHTML=`<div class="disc-gem" style="background:${CHX[color]};color:#fff">${rank}</div><div class="disc-pips">${pips}</div>`;
      tilesDiv.appendChild(dt);
    }
    group.appendChild(tilesDiv);
    el.appendChild(group);
  }
  // legend
  const leg=document.createElement('div');
  leg.style.cssText='margin-top:10px;font-size:10px;color:var(--ink3);border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:3px;';
  leg.innerHTML='<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;outline:2px solid #c0392b;outline-offset:1px;display:inline-block"></span>eliminated</span><span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;outline:2px solid #d4a017;outline-offset:1px;display:inline-block"></span>last copy</span>';
  el.appendChild(leg);
}

function renderLog(){
  const el=document.getElementById('pane-log');
  if(game.log.length===0){el.innerHTML='<div style="font-size:11px;color:var(--ink3);font-style:italic">No moves yet.</div>';return;}
  el.innerHTML=game.log.map((e,i)=>`<div class="log-line ${e.type}"><span class="n">${i+1}.</span>${e.text}</div>`).join('');
  el.scrollTop=el.scrollHeight;
}

function renderTrace(){
  const el=document.getElementById('pane-trace');
  el.innerHTML=thinkLines.slice(-60).map(l=>`<div class="trace-line">${l}</div>`).join('');
  el.scrollTop=el.scrollHeight;
}

function doAction(action){
  // save snapshot before applying
  history.push({game:game.clone(),thinkLines:[...thinkLines]});
  if(history.length>50)history.shift();
  document.getElementById('rewind-btn').disabled=false;
  try{game.apply(game.turn,action);}catch(e){history.pop();toast(e.message,true);return;}
  game.advance();selSlot=null;clueMode=false;clueTarget=null;clueType=null;clueVal=null;
  render();
}

function renderGameOver(){
  renderTopBar();renderSidebar();
  document.getElementById('action').innerHTML='';
  document.getElementById('hands').innerHTML='';
  const cls=game.result==='win'?'win':game.result==='loss'?'loss':'deck_out';
  const msg=game.result==='win'?`🎆 Perfect! Score ${game.score()}/25`:game.result==='loss'?`💥 3 strikes. Score ${game.score()}/25`:`🃏 Deck out. Score ${game.score()}/25`;
  document.getElementById('banner').innerHTML=`<div class="go-banner ${cls}"><h2>${msg}</h2><p>${game.turnN} turns · ${game.discN} discards · ${game.clueN} clues</p><button class="btn-go" style="width:auto;padding:10px 26px;margin-top:14px" onclick="document.getElementById('game').classList.remove('on');document.getElementById('setup').style.display='flex'">Play again</button></div>`;
  const hands=document.getElementById('hands');
  for(let p=0;p<game.n;p++){
    const div=document.createElement('div');div.className='player-row';
    div.innerHTML=`<div class="player-header"><span class="player-name">Player ${p}</span></div>`;
    const hand=document.createElement('div');hand.className='hand';
    for(const card of game.hands[p]){const t=document.createElement('div');t.className='tile';t.innerHTML=tileInner(card.color,card.rank);hand.appendChild(t);}
    div.appendChild(hand);hands.appendChild(div);
  }
  const wp=game.score()/25;
  document.getElementById('wm-fill').style.width=Math.round(wp*100)+'%';
  document.getElementById('wm-pct').textContent=game.score()+'/25';
}

function showPass(p){
  document.getElementById('ov-title').textContent=`Player ${p}'s turn`;
  document.getElementById('ov-sub').textContent=`Pass the device to Player ${p}, then tap Ready.`;
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ov-btn').onclick=()=>{document.getElementById('overlay').style.display='none';lastShown=p;renderAll();};
}

function toast(msg,err=false){
  const c=document.getElementById('toasts');const t=document.createElement('div');
  t.className='toast'+(err?' err':'');t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
</script>
</body>
</html>
