<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanabi Deluxe II</title>
<style>
  :root {
    --red: #c62828; --red-bg: #fdecea;
    --yellow: #f9a825; --yellow-bg: #fff8e1;
    --green: #2e7d32; --green-bg: #e8f5e9;
    --blue: #1565c0; --blue-bg: #e3f2fd;
    --white: #616161; --white-bg: #fafafa;
    --bg: #f4f3ef; --panel: #ffffff; --ink: #262521; --muted: #7a776d;
    --border: #ddd9cd; --accent: #3c3489;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.5;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 24px 20px 60px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  select, button, input {
    font-family: inherit; font-size: 14px; padding: 8px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: #fff; color: var(--ink); cursor: pointer;
  }
  button:hover { background: #f0efe9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #2d276b; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .seat-toggles { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .seat-chip {
    padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border);
    font-size: 13px; cursor: pointer; user-select: none;
  }
  .seat-chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .board-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .fireworks { display: flex; gap: 8px; }
  .tokens { display: flex; gap: 6px; align-items: center; }
  .token { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); }
  .token.clue-on { background: #4a90d9; border-color: #4a90d9; }
  .token.clue-off { background: #e5e3da; }
  .token.fuse-on { background: #d9534f; border-color: #d9534f; }
  .token.fuse-off { background: #e5e3da; }
  .meta-row { display: flex; gap: 20px; font-size: 13px; color: var(--muted); margin-top: 10px; flex-wrap: wrap; }
  .discard-caption { font-size: 13px; color: var(--muted); margin-top: 10px; margin-bottom: 4px; }
  .discard-groups { display: flex; flex-direction: column; gap: 6px; }
  .discard-group { display: flex; align-items: center; gap: 6px; }
  .discard-group-label { width: 56px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .discard-group-tiles { display: flex; gap: 4px; flex-wrap: wrap; }
  .hand-block { margin-bottom: 14px; }
  .hand-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .hand-title .turn-tag { background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .hand { display: flex; gap: 8px; flex-wrap: wrap; }

  .tile {
    width: 58px; height: 78px; border-radius: 7px; position: relative; cursor: default;
    background: linear-gradient(180deg, #fdf9ef 0%, #f4ecd8 100%);
    border: 1px solid #d9cca3;
    box-shadow: 0 2px 0 #d9cca3, 0 5px 6px rgba(60, 45, 10, 0.22);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  }
  .tile.small { width: 34px; height: 46px; border-radius: 5px; gap: 3px; box-shadow: 0 1px 0 #d9cca3, 0 2px 3px rgba(60, 45, 10, 0.2); }
  .tile.empty-slot {
    background: repeating-linear-gradient(45deg, #eee9db, #eee9db 5px, #e4ded0 5px, #e4ded0 10px);
    box-shadow: none; border: 1px dashed #cac0a4;
  }
  .tile.selectable { cursor: pointer; }
  .tile.selected { outline: 3px solid var(--accent); outline-offset: 2px; }

  .tile-gem {
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0;
  }
  .tile.small .tile-gem { width: 18px; height: 18px; font-size: 10px; }
  .tile-pips { display: flex; gap: 2px; }
  .pip { width: 5px; height: 5px; border-radius: 50%; }
  .tile.small .pip { width: 3px; height: 3px; }

  .tile.hidden-tile {
    background: repeating-linear-gradient(45deg, #ece1bf, #ece1bf 6px, #e2d5a9 6px, #e2d5a9 12px);
    border-color: #cbb787; color: #5c4a26; font-size: 10px; font-weight: 600;
    text-align: center; padding: 5px; justify-content: flex-start; gap: 2px;
  }
  .tile.hidden-tile .back-emblem { font-size: 15px; opacity: 0.4; }
  .tile .note { position: absolute; bottom: 3px; left: 3px; right: 3px; font-size: 8px; font-weight: 500; opacity: 0.8; line-height: 1.2; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .clue-target-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .clue-target { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .clue-target.chosen { background: var(--accent); color: #fff; border-color: var(--accent); }
  .color-swatch-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .color-swatch { width: 34px; height: 34px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
  .color-swatch.chosen { border-color: var(--ink); }
  .rank-btn { width: 34px; height: 34px; border-radius: 8px; cursor: pointer; }
  .rank-btn.chosen { background: var(--accent); color: #fff; border-color: var(--accent); }
  .log-panel { max-height: 220px; overflow-y: auto; font-size: 13px; }
  .log-line { padding: 3px 0; border-bottom: 1px solid #efece2; color: var(--muted); }
  .log-line .num { color: var(--ink); font-weight: 600; margin-right: 6px; }
  .think-line { font-size: 12px; color: var(--muted); font-style: italic; padding: 2px 0; }
  .advice-block { font-size: 13px; }
  .advice-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #efece2; }
  .banner { padding: 14px 18px; border-radius: 10px; font-weight: 600; margin-bottom: 16px; }
  .banner.win { background: var(--green-bg); color: var(--green); }
  .banner.loss { background: var(--red-bg); color: var(--red); }
  .banner.deck_out { background: var(--blue-bg); color: var(--blue); }
  .overlay {
    position: fixed; inset: 0; background: rgba(20,18,14,0.85); display: flex;
    align-items: center; justify-content: center; z-index: 50;
  }
  .overlay .card { background: #fff; padding: 40px; border-radius: 12px; text-align: center; max-width: 380px; }
  .hidden { display: none !important; }
  .small-muted { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Hanabi Deluxe II</h1>
  <p class="sub">Cooperative fireworks, played in the browser. Base rules: 50 tiles, 8 clues, 3 fuses.</p>

  <div class="panel" id="setup-panel">
    <div class="row">
      <div>
        <label for="player-count">Number of players</label>
        <select id="player-count">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <div>
        <label>Seed (optional)</label>
        <input id="seed-input" type="number" placeholder="random">
      </div>
      <div>
        <button class="primary" id="start-btn">Start game</button>
      </div>
    </div>
    <div style="margin-top:14px;">
      <label>Which seats are human? (rest are bots)</label>
      <div class="seat-toggles" id="seat-toggles"></div>
    </div>
  </div>

  <div id="game-area" class="hidden">
    <div id="banner-area"></div>
    <div class="panel">
      <div class="board-top">
        <div class="fireworks" id="fireworks-row"></div>
        <div>
          <div class="tokens" id="clue-tokens"></div>
          <div class="tokens" id="fuse-tokens" style="margin-top:4px;"></div>
        </div>
      </div>
      <div class="meta-row" id="meta-row"></div>
      <div class="discard-caption" id="discard-caption"></div>
      <div class="discard-groups" id="discard-groups"></div>
    </div>

    <div class="panel" id="hands-panel"></div>

    <div class="panel" id="action-panel"></div>

    <div class="row" style="align-items:flex-start;">
      <div class="panel" style="flex:1; min-width:260px;">
        <label>Move history</label>
        <div class="log-panel" id="log-panel"></div>
      </div>
      <div class="panel" style="flex:1; min-width:260px;">
        <label>Bot thinking (most recent)</label>
        <div class="log-panel" id="think-panel"></div>
      </div>
    </div>
  </div>

  <div id="pass-overlay" class="overlay hidden">
    <div class="card">
      <p style="font-size:16px; font-weight:600;" id="pass-text">Pass the device to Player 0</p>
      <button class="primary" id="pass-continue">I'm ready</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['Red','Yellow','Green','Blue','White'];
const COLOR_HEX = { Red: 'var(--red)', Yellow: 'var(--yellow)', Green: 'var(--green)', Blue: 'var(--blue)', White: 'var(--white)' };
const COLOR_BG = { Red: 'var(--red-bg)', Yellow: 'var(--yellow-bg)', Green: 'var(--green-bg)', Blue: 'var(--blue-bg)', White: 'var(--white-bg)' };
const RANK_COUNTS = {1:3, 2:2, 3:2, 4:2, 5:1};
const MAX_CLUES = 8;
const MAX_FUSES = 3;
const FIREWORK_TOTAL = 25;
const ALL_PAIRS = [];
for (const c of COLORS) for (const r in RANK_COUNTS) ALL_PAIRS.push(c + ',' + r);

function handSize(n) { return (n === 2 || n === 3) ? 5 : 4; }

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeRng(seed) {
  const s = (seed === null || seed === undefined || seed === '') ? Math.floor(Math.random() * 1e9) : Number(seed);
  return mulberry32(s);
}

function newDeck(rng) {
  const deck = [];
  for (const c of COLORS) {
    for (const r in RANK_COUNTS) {
      for (let i = 0; i < RANK_COUNTS[r]; i++) deck.push({color: c, rank: parseInt(r)});
    }
  }
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function newKnowledge() {
  return { possible: new Set(ALL_PAIRS), notes: [] };
}

function isIdentified(k) { return k.possible.size === 1; }
function isUntouched(k) { return k.possible.size === ALL_PAIRS.length; }

function filterKnowledge(k, predicate, noteText) {
  const before = k.possible;
  const after = new Set();
  for (const p of before) if (predicate(p)) after.add(p);
  k.possible = after;
  k.notes.push(noteText);
}

function pairOf(str) {
  const idx = str.lastIndexOf(',');
  return { color: str.slice(0, idx), rank: parseInt(str.slice(idx + 1)) };
}

class HanabiGame {
  constructor(numPlayers, seed) {
    this.n = numPlayers;
    this.h = handSize(numPlayers);
    this.rng = makeRng(seed);
    this.deck = newDeck(this.rng);
    this.hands = Array.from({length: this.n}, () => []);
    this.knowledge = Array.from({length: this.n}, () => []);
    for (let round = 0; round < this.h; round++) {
      for (let p = 0; p < this.n; p++) this.drawToHand(p);
    }
    this.discardPile = [];
    this.fireworks = {}; for (const c of COLORS) this.fireworks[c] = 0;
    this.clueTokens = MAX_CLUES;
    this.strikes = 0;
    this.currentPlayer = 0;
    this.turnCount = 0;
    this.finalRoundLeft = null;
    this.gameOver = false;
    this.result = null;
    this.log = [];
    this.discardsMade = 0;
    this.cluesGiven = 0;
  }

  drawToHand(player) {
    if (this.deck.length > 0) {
      this.hands[player].push(this.deck.pop());
      this.knowledge[player].push(newKnowledge());
    }
  }

  score() {
    let s = 0; for (const c of COLORS) s += this.fireworks[c]; return s;
  }

  accountedCounts() {
    const acc = {};
    for (const card of this.discardPile) {
      const key = card.color + ',' + card.rank;
      acc[key] = (acc[key] || 0) + 1;
    }
    for (const c of COLORS) {
      for (let r = 1; r <= this.fireworks[c]; r++) {
        const key = c + ',' + r;
        acc[key] = (acc[key] || 0) + 1;
      }
    }
    for (const hand of this.knowledge) {
      for (const k of hand) {
        if (isIdentified(k)) {
          const key = [...k.possible][0];
          acc[key] = (acc[key] || 0) + 1;
        }
      }
    }
    return acc;
  }

  runElimination() {
    let changed = true;
    while (changed) {
      changed = false;
      const acc = this.accountedCounts();
      for (const hand of this.knowledge) {
        for (const k of hand) {
          if (isIdentified(k)) continue;
          const before = k.possible;
          const after = new Set();
          const removed = [];
          for (const p of before) {
            const { color, rank } = pairOf(p);
            if ((acc[p] || 0) < RANK_COUNTS[rank]) after.add(p);
            else removed.push(p);
          }
          if (after.size !== before.size) {
            for (const p of removed) {
              const { color, rank } = pairOf(p);
              k.notes.push(`eliminated ${color}${rank} (all ${RANK_COUNTS[rank]} copies already accounted for elsewhere)`);
            }
            k.possible = after;
            changed = true;
            if (after.size === 1) {
              const { color, rank } = pairOf([...after][0]);
              k.notes.push(`=> by elimination, this MUST be ${color}${rank} (pigeonhole: nowhere else it could be)`);
            }
          }
        }
      }
    }
  }

  legalActions(player) {
    const actions = [];
    if (this.clueTokens > 0) {
      for (let target = 0; target < this.n; target++) {
        if (target === player) continue;
        const colorsPresent = new Set(this.hands[target].map(c => c.color));
        const ranksPresent = new Set(this.hands[target].map(c => c.rank));
        for (const c of colorsPresent) actions.push({kind:'clue', target, clueType:'color', value:c});
        for (const r of ranksPresent) actions.push({kind:'clue', target, clueType:'rank', value:r});
      }
    }
    if (this.clueTokens < MAX_CLUES) {
      for (let i = 0; i < this.hands[player].length; i++) actions.push({kind:'discard', idx:i});
    }
    for (let i = 0; i < this.hands[player].length; i++) actions.push({kind:'play', idx:i});
    return actions;
  }

  applyAction(player, action) {
    if (this.gameOver) throw new Error('game already over');
    if (action.kind === 'clue') {
      if (this.clueTokens <= 0) throw new Error('no clue tokens available');
      if (action.target === player) throw new Error("can't clue yourself");
      let matchedAny = false;
      for (let i = 0; i < this.hands[action.target].length; i++) {
        const card = this.hands[action.target][i];
        const k = this.knowledge[action.target][i];
        if (action.clueType === 'color') {
          const matches = card.color === action.value;
          filterKnowledge(k, p => (pairOf(p).color === action.value) === matches, `told color ${matches?'IS':'is NOT'} ${action.value}`);
          matchedAny = matchedAny || matches;
        } else {
          const matches = card.rank === action.value;
          filterKnowledge(k, p => (pairOf(p).rank === action.value) === matches, `told rank ${matches?'IS':'is NOT'} ${action.value}`);
          matchedAny = matchedAny || matches;
        }
      }
      if (!matchedAny) throw new Error('clue must match at least one tile');
      this.clueTokens -= 1;
      this.cluesGiven += 1;
      this.log.push(`P${player} clues P${action.target}: ${action.clueType}=${action.value}`);
      this.runElimination();
    } else if (action.kind === 'discard') {
      if (this.clueTokens >= MAX_CLUES) throw new Error("can't discard while all 8 clue tokens are available");
      const card = this.hands[player].splice(action.idx, 1)[0];
      this.knowledge[player].splice(action.idx, 1);
      this.discardPile.push(card);
      this.clueTokens = Math.min(MAX_CLUES, this.clueTokens + 1);
      this.discardsMade += 1;
      this.log.push(`P${player} discards ${card.color}${card.rank}`);
      this.runElimination();
      this.drawReplacement(player);
    } else if (action.kind === 'play') {
      const card = this.hands[player].splice(action.idx, 1)[0];
      this.knowledge[player].splice(action.idx, 1);
      if (this.fireworks[card.color] === card.rank - 1) {
        this.fireworks[card.color] = card.rank;
        this.log.push(`P${player} plays ${card.color}${card.rank} (success)`);
        if (card.rank === 5) this.clueTokens = Math.min(MAX_CLUES, this.clueTokens + 1);
        if (this.score() === FIREWORK_TOTAL) { this.gameOver = true; this.result = 'win'; }
      } else {
        this.discardPile.push(card);
        this.strikes += 1;
        this.log.push(`P${player} MISPLAYS ${card.color}${card.rank} (strike ${this.strikes}/${MAX_FUSES})`);
        if (this.strikes >= MAX_FUSES) { this.gameOver = true; this.result = 'loss'; }
      }
      this.runElimination();
      if (!this.gameOver) this.drawReplacement(player);
    } else {
      throw new Error('unknown action');
    }
  }

  drawReplacement(player) {
    if (this.deck.length > 0) {
      this.drawToHand(player);
      if (this.deck.length === 0 && this.finalRoundLeft === null) {
        this.finalRoundLeft = this.n + 1;
      }
    }
  }

  advanceTurn() {
    this.turnCount += 1;
    if (this.finalRoundLeft !== null) {
      this.finalRoundLeft -= 1;
      if (this.finalRoundLeft <= 0 && !this.gameOver) {
        this.gameOver = true;
        this.result = this.result || 'deck_out';
      }
    }
    this.currentPlayer = (this.currentPlayer + 1) % this.n;
  }
}

function remainingCount(game, color, rank) {
  let total = RANK_COUNTS[rank];
  let used = 0;
  for (const c of game.discardPile) if (c.color === color && c.rank === rank) used++;
  if (game.fireworks[color] >= rank) used++;
  return total - used;
}

function isPlayable(possible, fireworks) {
  for (const p of possible) { const {color, rank} = pairOf(p); if (fireworks[color] !== rank - 1) return false; }
  return true;
}
function isDead(possible, fireworks) {
  for (const p of possible) { const {color, rank} = pairOf(p); if (rank > fireworks[color]) return false; }
  return true;
}

function describeKnowledge(k) {
  if (isIdentified(k)) { const {color, rank} = pairOf([...k.possible][0]); return `${color}${rank} (known)`; }
  const colors = new Set(); const ranks = new Set();
  for (const p of k.possible) { const {color, rank} = pairOf(p); colors.add(color); ranks.add(rank); }
  const colorStr = colors.size < COLORS.length ? [...colors].map(c=>c[0]).sort().join(',') : 'any';
  const rankStr = ranks.size < Object.keys(RANK_COUNTS).length ? [...ranks].sort((a,b)=>a-b).join(',') : 'any';
  return `color:[${colorStr}] rank:[${rankStr}]`;
}

function chooseAction(game, player, trace) {
  trace = trace || [];
  const hand = game.hands[player];
  const know = game.knowledge[player];

  trace.push('My hand: ' + know.map((k,i) => `[${i}] ${describeKnowledge(k)}`).join(' | '));
  for (let i = 0; i < know.length; i++) {
    const notes = know[i].notes.filter(n => n.startsWith('=>'));
    if (notes.length) trace.push(`  slot ${i}: ${notes[notes.length-1]}`);
  }

  for (let i = 0; i < know.length; i++) {
    if (isPlayable(know[i].possible, game.fireworks)) {
      trace.push(`Slot ${i} (${describeKnowledge(know[i])}) is provably playable -> PLAY slot ${i}.`);
      return { action: {kind:'play', idx:i}, trace };
    }
  }

  if (game.clueTokens > 0) {
    for (let offset = 1; offset < game.n; offset++) {
      const target = (player + offset) % game.n;
      const tHand = game.hands[target]; const tKnow = game.knowledge[target];
      for (let i = 0; i < tHand.length; i++) {
        const card = tHand[i]; const k = tKnow[i];
        if (isPlayable(k.possible, game.fireworks)) continue;
        if (game.fireworks[card.color] !== card.rank - 1) continue;
        const trialColor = new Set([...k.possible].filter(p => pairOf(p).color === card.color));
        if (trialColor.size && isPlayable(trialColor, game.fireworks)) {
          trace.push(`P${target}'s slot ${i} is really ${card.color}${card.rank} and IS playable now. A color clue would fully pin it down -> clue P${target} color=${card.color}.`);
          return { action: {kind:'clue', target, clueType:'color', value:card.color}, trace };
        }
        const trialRank = new Set([...k.possible].filter(p => pairOf(p).rank === card.rank));
        if (trialRank.size && isPlayable(trialRank, game.fireworks)) {
          trace.push(`P${target}'s slot ${i} is really ${card.color}${card.rank} and IS playable now. A rank clue would fully pin it down -> clue P${target} rank=${card.rank}.`);
          return { action: {kind:'clue', target, clueType:'rank', value:card.rank}, trace };
        }
      }
    }
    for (let offset = 1; offset < game.n; offset++) {
      const target = (player + offset) % game.n;
      const tHand = game.hands[target]; const tKnow = game.knowledge[target];
      const chopIdx = tKnow.findIndex(k => isUntouched(k));
      if (chopIdx === -1) continue;
      const card = tHand[chopIdx];
      if (card.rank === 5 || remainingCount(game, card.color, card.rank) === 1) {
        if (!isDead(tKnow[chopIdx].possible, game.fireworks)) {
          const reason = card.rank === 5 ? "it's a 5" : "it's the LAST remaining copy of that tile";
          trace.push(`P${target}'s chop (slot ${chopIdx}, really ${card.color}${card.rank}) is untouched and ${reason} - giving a save clue -> clue P${target} rank=${card.rank}.`);
          return { action: {kind:'clue', target, clueType:'rank', value:card.rank}, trace };
        }
      }
    }
  }

  if (game.clueTokens < MAX_CLUES) {
    for (let i = 0; i < know.length; i++) {
      if (isDead(know[i].possible, game.fireworks)) {
        trace.push(`Slot ${i} (${describeKnowledge(know[i])}) is provably dead already -> DISCARD slot ${i}.`);
        return { action: {kind:'discard', idx:i}, trace };
      }
    }
    for (let i = 0; i < know.length; i++) {
      if (isUntouched(know[i])) {
        trace.push(`Nothing provably playable or dead. Slot ${i} is my oldest untouched tile (chop) -> DISCARD slot ${i}.`);
        return { action: {kind:'discard', idx:i}, trace };
      }
    }
    trace.push('Nothing clearly safe to discard, falling back to slot 0 -> DISCARD slot 0.');
    return { action: {kind:'discard', idx:0}, trace };
  }

  const legal = game.legalActions(player).filter(a => a.kind === 'clue');
  if (legal.length) {
    trace.push('Clue tokens maxed at 8 so I can\'t discard, and nothing useful to clue - spending an arbitrary clue.');
    return { action: legal[0], trace };
  }
  trace.push('No clue tokens and can\'t discard - forced to play blind on slot 0.');
  return { action: {kind:'play', idx:0}, trace };
}

function slotProbabilities(game, player, slotIdx) {
  const k = game.knowledge[player][slotIdx];
  const acc = game.accountedCounts();
  const weights = {};
  let total = 0;
  for (const p of k.possible) {
    const { rank } = pairOf(p);
    const w = RANK_COUNTS[rank] - (acc[p] || 0);
    if (w > 0) { weights[p] = w; total += w; }
  }
  const probs = {};
  for (const p in weights) probs[p] = weights[p] / total;
  return probs;
}

function analyzeHand(game, player) {
  const results = [];
  for (let i = 0; i < game.hands[player].length; i++) {
    const probs = slotProbabilities(game, player, i);
    let pPlay = 0, pCritical = 0;
    for (const p in probs) {
      const { color, rank } = pairOf(p);
      if (game.fireworks[color] === rank - 1) pPlay += probs[p];
      if (rank > game.fireworks[color] && remainingCount(game, color, rank) <= 1) pCritical += probs[p];
    }
    results.push({ slot: i, pPlay, pCritical });
  }
  return results;
}

function recommendAction(game, player) {
  const lines = [];
  const analysis = analyzeHand(game, player);
  lines.push('Play safety by slot:');
  for (const a of analysis) lines.push(`  slot ${a.slot}: P(playable) = ${(a.pPlay*100).toFixed(1)}%${a.pPlay >= 0.999 ? ' (certain)' : ''}`);
  lines.push('Discard risk by slot:');
  for (const a of analysis) lines.push(`  slot ${a.slot}: P(critical if discarded) = ${(a.pCritical*100).toFixed(1)}%${a.pCritical >= 0.999 ? ' (avoid!)' : ''}`);
  const bestPlay = analysis.reduce((a,b) => b.pPlay > a.pPlay ? b : a);
  const safestDiscard = analysis.reduce((a,b) => b.pCritical < a.pCritical ? b : a);
  const { action: botAction, trace } = chooseAction(game, player, []);
  lines.push('');
  let suggestion;
  if (bestPlay.pPlay >= 0.999) {
    lines.push(`RECOMMENDATION: play slot ${bestPlay.slot} - provably safe (100%).`);
    suggestion = {kind:'play', idx:bestPlay.slot};
  } else if (botAction.kind === 'clue') {
    lines.push(`RECOMMENDATION: ${trace[trace.length-1]}`);
    suggestion = botAction;
  } else if (game.clueTokens < MAX_CLUES) {
    lines.push(`RECOMMENDATION: discard slot ${safestDiscard.slot} - lowest risk (${(safestDiscard.pCritical*100).toFixed(1)}%).`);
    suggestion = {kind:'discard', idx:safestDiscard.slot};
  } else {
    lines.push(`RECOMMENDATION: ${trace[trace.length-1]}`);
    suggestion = botAction;
  }
  return { lines, suggestion };
}

var game = null;
var humanSeats = new Set([0]);
var selectedSlot = null;
var clueMode = false;
var clueTargetIdx = null;
var clueType = null;
var clueValue = null;
var lastShownPlayer = -1;
var thinkingLines = [];

function renderSeatToggles() {
  const n = parseInt(document.getElementById('player-count').value);
  const container = document.getElementById('seat-toggles');
  container.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const chip = document.createElement('div');
    chip.className = 'seat-chip' + (humanSeats.has(i) ? ' on' : '');
    chip.textContent = 'Player ' + i;
    chip.onclick = () => {
      if (humanSeats.has(i)) humanSeats.delete(i); else humanSeats.add(i);
      renderSeatToggles();
    };
    container.appendChild(chip);
  }
}

document.getElementById('player-count').addEventListener('change', () => {
  const n = parseInt(document.getElementById('player-count').value);
  humanSeats = new Set([...humanSeats].filter(s => s < n));
  if (humanSeats.size === 0) humanSeats.add(0);
  renderSeatToggles();
});
renderSeatToggles();

document.getElementById('start-btn').addEventListener('click', () => {
  const n = parseInt(document.getElementById('player-count').value);
  const seedRaw = document.getElementById('seed-input').value;
  const seed = seedRaw === '' ? null : parseInt(seedRaw);
  if (humanSeats.size === 0) { alert('Pick at least one human seat.'); return; }
  game = new HanabiGame(n, seed);
  thinkingLines = [];
  lastShownPlayer = -1;
  selectedSlot = null; clueMode = false; clueTargetIdx = null; clueType = null; clueValue = null;
  document.getElementById('setup-panel').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  render();
});

function pushThinking(line) {
  thinkingLines.push(line);
  if (thinkingLines.length > 300) thinkingLines.shift();
}

function advanceUntilHumanOrOver() {
  while (!game.gameOver && !humanSeats.has(game.currentPlayer)) {
    const player = game.currentPlayer;
    const { action, trace } = chooseAction(game, player, []);
    for (const line of trace) pushThinking(`(P${player}) ${line}`);
    game.applyAction(player, action);
    pushThinking(`>> ${game.log[game.log.length - 1]}`);
    game.advanceTurn();
  }
}

function render() {
  advanceUntilHumanOrOver();
  if (game.gameOver) { renderGameOver(); return; }
  const cp = game.currentPlayer;
  if (humanSeats.size > 1 && cp !== lastShownPlayer) {
    showPassOverlay(cp);
  } else {
    lastShownPlayer = cp;
    renderGameScreen();
  }
}

function showPassOverlay(player) {
  document.getElementById('pass-text').textContent = `Pass the device to Player ${player}`;
  const overlay = document.getElementById('pass-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('pass-continue').onclick = () => {
    overlay.classList.add('hidden');
    lastShownPlayer = player;
    renderGameScreen();
  };
}

const GEM_COLORS = { Red: '#c62828', Yellow: '#f2a900', Green: '#2e7d32', Blue: '#1565c0', White: '#c8c6bd' };
const GEM_TEXT = { Red: '#fff', Yellow: '#3a2600', Green: '#fff', Blue: '#fff', White: '#3a3a35' };

function makeTileFront(card, small) {
  const tile = document.createElement('div');
  tile.className = 'tile' + (small ? ' small' : '');
  const gem = document.createElement('div');
  gem.className = 'tile-gem';
  gem.style.background = GEM_COLORS[card.color];
  gem.style.color = GEM_TEXT[card.color];
  gem.textContent = card.rank;
  tile.appendChild(gem);
  const pips = document.createElement('div');
  pips.className = 'tile-pips';
  for (let i = 0; i < card.rank; i++) {
    const p = document.createElement('div');
    p.className = 'pip';
    p.style.background = GEM_COLORS[card.color];
    pips.appendChild(p);
  }
  tile.appendChild(pips);
  return tile;
}

function makeEmptySlot(small) {
  const tile = document.createElement('div');
  tile.className = 'tile empty-slot' + (small ? ' small' : '');
  return tile;
}

function renderGameScreen() {
  document.getElementById('banner-area').innerHTML = '';
  renderBoard();
  renderHands();
  renderActionPanel();
  renderLog();
  renderThinking();
}

function renderBoard() {
  const fwRow = document.getElementById('fireworks-row');
  fwRow.innerHTML = '';
  for (const c of COLORS) {
    const top = game.fireworks[c];
    const tile = top > 0 ? makeTileFront({color: c, rank: top}, true) : makeEmptySlot(true);
    fwRow.appendChild(tile);
  }
  const clueRow = document.getElementById('clue-tokens');
  clueRow.innerHTML = '<span class="small-muted" style="margin-right:6px;">Clues:</span>';
  for (let i = 0; i < MAX_CLUES; i++) {
    const t = document.createElement('div');
    t.className = 'token ' + (i < game.clueTokens ? 'clue-on' : 'clue-off');
    clueRow.appendChild(t);
  }
  const fuseRow = document.getElementById('fuse-tokens');
  fuseRow.innerHTML = '<span class="small-muted" style="margin-right:6px;">Fuses:</span>';
  for (let i = 0; i < MAX_FUSES; i++) {
    const t = document.createElement('div');
    t.className = 'token ' + (i < game.strikes ? 'fuse-on' : 'fuse-off');
    fuseRow.appendChild(t);
  }
  document.getElementById('meta-row').innerHTML = `
    <span>Turn ${game.turnCount + 1}</span>
    <span>Score: ${game.score()}/25</span>
    <span>Deck left: ${game.deck.length}</span>
    <span>Current player: P${game.currentPlayer}</span>
  `;
  document.getElementById('discard-caption').textContent = game.discardPile.length === 0
    ? 'Discard pile: (empty)' : `Discard pile (${game.discardPile.length} tiles):`;
  const groupsEl = document.getElementById('discard-groups');
  groupsEl.innerHTML = '';
  if (game.discardPile.length > 0) {
    const byColor = {}; for (const c of COLORS) byColor[c] = [];
    for (const card of game.discardPile) byColor[card.color].push(card.rank);
    for (const c of COLORS) {
      const ranks = byColor[c].slice().sort((a, b) => a - b);
      if (ranks.length === 0) continue;
      const row = document.createElement('div');
      row.className = 'discard-group';
      const label = document.createElement('div');
      label.className = 'discard-group-label';
      label.textContent = c;
      row.appendChild(label);
      const tilesDiv = document.createElement('div');
      tilesDiv.className = 'discard-group-tiles';
      for (const r of ranks) tilesDiv.appendChild(makeTileFront({color: c, rank: r}, true));
      row.appendChild(tilesDiv);
      groupsEl.appendChild(row);
    }
  }
}

function renderHands() {
  const panel = document.getElementById('hands-panel');
  panel.innerHTML = '';
  const cp = game.currentPlayer;
  for (let p = 0; p < game.n; p++) {
    const block = document.createElement('div');
    block.className = 'hand-block';
    const title = document.createElement('div');
    title.className = 'hand-title';
    title.innerHTML = `Player ${p}` + (p === cp ? ' <span class="turn-tag">current turn</span>' : '');
    if (clueMode && p !== cp) {
      title.style.cursor = 'pointer';
      title.style.textDecoration = clueTargetIdx === p ? 'underline' : 'none';
      title.onclick = () => { clueTargetIdx = p; clueType = null; clueValue = null; renderActionPanel(); };
    }
    block.appendChild(title);
    const handDiv = document.createElement('div');
    handDiv.className = 'hand';
    const isOwnHidden = (p === cp);
    const cards = game.hands[p];
    const knows = game.knowledge[p];
    for (let i = 0; i < cards.length; i++) {
      let tile;
      if (isOwnHidden) {
        tile = document.createElement('div');
        tile.className = 'tile hidden-tile selectable' + (selectedSlot === i ? ' selected' : '');
        const emblem = document.createElement('div');
        emblem.className = 'back-emblem';
        emblem.textContent = '⛩';
        tile.appendChild(emblem);
        const label = document.createElement('div');
        label.textContent = describeKnowledge(knows[i]);
        tile.appendChild(label);
        const pigeonholeNotes = knows[i].notes.filter(n => n.startsWith('=>'));
        if (pigeonholeNotes.length) {
          const note = document.createElement('div');
          note.className = 'note';
          note.textContent = pigeonholeNotes[pigeonholeNotes.length - 1].replace('=> ', '');
          tile.appendChild(note);
        }
        tile.onclick = () => { selectedSlot = i; renderActionPanel(); renderHands(); };
      } else {
        tile = makeTileFront(cards[i], false);
      }
      handDiv.appendChild(tile);
    }
    block.appendChild(handDiv);
    panel.appendChild(block);
  }
}

function renderActionPanel() {
  const panel = document.getElementById('action-panel');
  panel.innerHTML = '';

  const selInfo = document.createElement('div');
  selInfo.className = 'small-muted';
  selInfo.textContent = selectedSlot === null ? 'Click a tile in your own hand above to select it.' : `Selected: slot ${selectedSlot}`;
  panel.appendChild(selInfo);

  const controls = document.createElement('div');
  controls.className = 'controls';

  const playBtn = document.createElement('button');
  playBtn.className = 'primary';
  playBtn.textContent = 'Play selected tile';
  playBtn.disabled = selectedSlot === null;
  playBtn.onclick = () => submitAction({kind: 'play', idx: selectedSlot});
  controls.appendChild(playBtn);

  const discardBtn = document.createElement('button');
  discardBtn.textContent = 'Discard selected tile';
  discardBtn.disabled = selectedSlot === null || game.clueTokens >= MAX_CLUES;
  discardBtn.title = game.clueTokens >= MAX_CLUES ? "Can't discard while all 8 clue tokens are available" : '';
  discardBtn.onclick = () => submitAction({kind: 'discard', idx: selectedSlot});
  controls.appendChild(discardBtn);

  const clueBtn = document.createElement('button');
  clueBtn.textContent = clueMode ? 'Cancel clue' : 'Give a clue';
  clueBtn.disabled = game.clueTokens <= 0 && !clueMode;
  clueBtn.onclick = () => {
    clueMode = !clueMode; clueTargetIdx = null; clueType = null; clueValue = null;
    renderActionPanel(); renderHands();
  };
  controls.appendChild(clueBtn);

  const adviceBtn = document.createElement('button');
  adviceBtn.textContent = 'Get advice';
  adviceBtn.onclick = () => renderAdvice();
  controls.appendChild(adviceBtn);

  panel.appendChild(controls);

  if (clueMode) {
    const clueSection = document.createElement('div');
    clueSection.innerHTML = '<div class="small-muted" style="margin-top:10px;">Click a player name above to choose a clue target, then pick a color or rank.</div>';
    if (clueTargetIdx !== null) {
      const targetHand = game.hands[clueTargetIdx];
      const colorsPresent = new Set(targetHand.map(c => c.color));
      const ranksPresent = new Set(targetHand.map(c => c.rank));
      const swatchRow = document.createElement('div');
      swatchRow.className = 'color-swatch-row';
      for (const c of COLORS) {
        const sw = document.createElement('div');
        sw.className = 'color-swatch' + (clueType === 'color' && clueValue === c ? ' chosen' : '');
        sw.style.background = COLOR_HEX[c];
        sw.title = c;
        if (!colorsPresent.has(c)) { sw.style.opacity = 0.25; sw.style.cursor = 'not-allowed'; }
        else sw.onclick = () => { clueType = 'color'; clueValue = c; renderActionPanel(); };
        swatchRow.appendChild(sw);
      }
      clueSection.appendChild(swatchRow);
      const rankRow = document.createElement('div');
      rankRow.className = 'color-swatch-row';
      for (let r = 1; r <= 5; r++) {
        const rb = document.createElement('button');
        rb.className = 'rank-btn' + (clueType === 'rank' && clueValue === r ? ' chosen' : '');
        rb.textContent = r;
        if (!ranksPresent.has(r)) rb.disabled = true;
        else rb.onclick = () => { clueType = 'rank'; clueValue = r; renderActionPanel(); };
        rankRow.appendChild(rb);
      }
      clueSection.appendChild(rankRow);
      const sendBtn = document.createElement('button');
      sendBtn.className = 'primary';
      sendBtn.style.marginTop = '10px';
      sendBtn.textContent = 'Send clue';
      sendBtn.disabled = clueType === null;
      sendBtn.onclick = () => submitAction({kind: 'clue', target: clueTargetIdx, clueType, value: clueValue});
      clueSection.appendChild(sendBtn);
    }
    panel.appendChild(clueSection);
  }

  const adviceArea = document.createElement('div');
  adviceArea.id = 'advice-area';
  adviceArea.className = 'advice-block';
  adviceArea.style.marginTop = '10px';
  panel.appendChild(adviceArea);
}

function renderAdvice() {
  const { lines } = recommendAction(game, game.currentPlayer);
  document.getElementById('advice-area').innerHTML =
    lines.map(l => `<div class="advice-row"><span>${l}</span></div>`).join('');
}

function submitAction(action) {
  try {
    game.applyAction(game.currentPlayer, action);
  } catch (e) {
    alert('Illegal move: ' + e.message);
    return;
  }
  game.advanceTurn();
  selectedSlot = null;
  clueMode = false; clueTargetIdx = null; clueType = null; clueValue = null;
  render();
}

function renderLog() {
  const panel = document.getElementById('log-panel');
  panel.innerHTML = game.log.map((line, i) => `<div class="log-line"><span class="num">${i + 1}.</span>${line}</div>`).join('');
  panel.scrollTop = panel.scrollHeight;
}

function renderThinking() {
  const panel = document.getElementById('think-panel');
  panel.innerHTML = thinkingLines.slice(-40).map(l => `<div class="think-line">${l}</div>`).join('');
  panel.scrollTop = panel.scrollHeight;
}

function renderGameOver() {
  document.getElementById('action-panel').innerHTML = '';
  const banner = document.getElementById('banner-area');
  const cls = game.result === 'win' ? 'win' : (game.result === 'loss' ? 'loss' : 'deck_out');
  const text = game.result === 'win' ? `Perfect game! Score ${game.score()}/25` :
    game.result === 'loss' ? `Game over - 3 strikes. Final score ${game.score()}/25` :
      `Deck exhausted. Final score ${game.score()}/25`;
  banner.innerHTML = `<div class="banner ${cls}">${text}</div>`;
  renderBoard();
  const panel = document.getElementById('hands-panel');
  panel.innerHTML = '';
  for (let p = 0; p < game.n; p++) {
    const block = document.createElement('div');
    block.className = 'hand-block';
    block.innerHTML = `<div class="hand-title">Player ${p}</div>`;
    const handDiv = document.createElement('div');
    handDiv.className = 'hand';
    for (const card of game.hands[p]) {
      handDiv.appendChild(makeTileFront(card, false));
    }
    block.appendChild(handDiv);
    panel.appendChild(block);
  }
  renderLog();
  renderThinking();
  const restartBtn = document.createElement('button');
  restartBtn.className = 'primary';
  restartBtn.textContent = 'Play again';
  restartBtn.style.marginTop = '12px';
  restartBtn.onclick = () => {
    document.getElementById('game-area').classList.add('hidden');
    document.getElementById('setup-panel').classList.remove('hidden');
  };
  document.getElementById('action-panel').appendChild(restartBtn);
}
</script>
